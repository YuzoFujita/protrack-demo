<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>ログイン - Protrack</title>
    <link rel="stylesheet" href="css/login.css" />
  </head>
  <body>
    <div class="login-page">
      <div class="login-container">
        <!-- ロゴ -->
        <div class="logo-area">
          <span class="logo-text">ProTrack</span>
          <img src="icon.svg" alt="ProTrack" class="logo-icon" />
        </div>

        <!-- ログインフォーム -->
        <div class="login-form">
          <div class="form-row">
            <label>メールアドレス</label>
            <input
              type="email"
              id="email"
              placeholder="メールアドレスを入力してください。"
            />
          </div>
          <div class="form-row">
            <label>パスワード</label>
            <input
              type="password"
              id="password"
              placeholder="パスワードを入力してください。"
            />
          </div>
          <div id="errorMsg" class="error-msg" style="display: none">
            メールアドレスまたはパスワードが違います
          </div>
          <button class="btn-login" onclick="login()">ログイン</button>
          <p class="register-link">
            アカウントをお持ちでない方<br />
            →新規登録は <a onclick="goToRegister()">こちら</a>
          </p>
        </div>
      </div>
    </div>
    <script src="js/login.js"></script>
  </body>
</html>
