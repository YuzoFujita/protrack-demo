<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>ユーザー登録 - Protrack</title>
    <link rel="stylesheet" href="css/register.css" />
  </head>
  <body>
    <div class="register-page">
      <!-- 左上タイトル -->
      <div class="page-title">ユーザー登録</div>

      <div class="register-container">
        <!-- ロゴ -->
        <div class="logo-area">
          <span class="logo-text">ProTrack</span>
          <img src="icon.svg" alt="ProTrack" class="logo-icon" />
        </div>

        <!-- 登録フォーム -->
        <div class="register-form">
          <div class="form-row">
            <label>メールアドレス</label>
            <input
              type="email"
              id="email"
              placeholder="メールアドレスを入力してください。"
            />
          </div>
          <div class="form-row">
            <label>パスワード</label>
            <input
              type="password"
              id="password"
              placeholder="パスワードを入力してください。"
            />
          </div>
          <div class="form-row">
            <label>名前</label>
            <div class="name-inputs">
              <input type="text" id="lastName" placeholder="姓" />
              <input type="text" id="firstName" placeholder="名" />
            </div>
          </div>
          <div id="errorMsg" class="error-msg" style="display: none">
            入力内容を確認してください
          </div>
          <button class="btn-register" onclick="register()">登録</button>
          <p class="login-link">
            すでにアカウントをお持ちの方<br />
            →ログインへ <a onclick="goToLogin()">戻る</a>
          </p>
        </div>
      </div>
    </div>
    <script src="js/register.js"></script>
  </body>
</html>
