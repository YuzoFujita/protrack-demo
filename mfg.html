<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>製造設定 - Protrack</title>
    <link rel="stylesheet" href="css/mfg.css" />
    <link rel="stylesheet" href="css/common.css" />
  </head>
  <body>
    <div class="mfg-page">
      <!-- ヘッダー -->
      <div class="mfg-header">
        <h1>製造設定</h1>
        <div class="user-info">
          👤 管理者
          <a onclick="logout()">ログアウト</a>
        </div>
      </div>

      <!-- 品名タブ -->
      <div class="tab-row">
        <label>品名</label>
        <div class="tab-group">
          <button
            class="tab-btn"
            id="tab-metal"
            onclick="selectProduct('メタル')"
          >
            メタル
          </button>
          <button
            class="tab-btn active"
            id="tab-bushu"
            onclick="selectProduct('ブシュ')"
          >
            ブシュ
          </button>
          <button
            class="tab-btn"
            id="tab-washer"
            onclick="selectProduct('ワッシャ')"
          >
            ワッシャ
          </button>
        </div>
      </div>

      <!-- 設定項目タブ -->
      <div class="tab-row">
        <label>設定項目</label>
        <div class="tab-group">
          <button class="tab-btn" id="tab-mct" onclick="selectSetting('mct')">
            個当たり製造時間
          </button>
          <button class="tab-btn" id="tab-type" onclick="selectSetting('type')">
            製造種別
          </button>
          <button class="tab-btn" id="tab-work" onclick="selectSetting('work')">
            1人当たりの稼働時間
          </button>
        </div>
      </div>

      <p class="edit-label">＜編集画面＞</p>
      <hr class="section-line" />

      <!-- 準備中メッセージ -->
      <div id="notReady" style="display: none">
        <p class="not-ready-msg">
          ⚠️ 準備中です。ブシュの運用が安定してから実装予定です。
        </p>
      </div>

      <!-- ① 個当たり製造時間 -->
      <div id="panel-mct" style="display: none">
        <table class="mfg-table">
          <thead>
            <tr>
              <th>工程</th>
              <th>MCT, 秒</th>
              <th>不良率, %</th>
              <th>1回当たり段替時間, h</th>
            </tr>
          </thead>
          <tbody id="mctTableBody">
            <!-- JSで動的生成 -->
          </tbody>
        </table>
      </div>

      <!-- ② 製造種別 -->
      <div id="panel-type" style="display: none">
        <table class="mfg-table" id="typeTable">
          <thead>
            <tr id="typeHeaderRow">
              <!-- JSで動的生成 -->
            </tr>
          </thead>
          <tbody id="typeTableBody">
            <!-- JSで動的生成 -->
          </tbody>
        </table>
      </div>

      <!-- ③ 1人当たりの稼働時間 -->
      <div id="panel-work" style="display: none">
        <div class="work-row">
          <label>1日の定労働時間</label>
          <input type="number" id="workHours" class="work-input" step="0.1" />
          <span>h</span>
        </div>
        <div class="work-divider">除外時間</div>
        <hr class="work-line" />
        <div class="work-row indent">
          <label>朝Mt.</label>
          <input
            type="number"
            id="excludeMorning"
            class="work-input"
            step="0.1"
          />
          <span>分</span>
        </div>
        <div class="work-row indent">
          <label>2S/ MM</label>
          <input type="number" id="exclude2s" class="work-input" step="0.1" />
          <span>分</span>
        </div>
        <div class="work-row indent">
          <label>安全</label>
          <input
            type="number"
            id="excludeSafety"
            class="work-input"
            step="0.1"
          />
          <span>分</span>
        </div>
        <div class="work-row indent">
          <label>QC</label>
          <input type="number" id="excludeQC" class="work-input" step="0.1" />
          <span>分</span>
        </div>
        <div class="work-row indent">
          <label>年休</label>
          <input
            type="number"
            id="excludeVacation"
            class="work-input"
            step="0.1"
          />
          <span>分</span>
        </div>
        <div class="work-result">
          <label>1日の正味製造時間</label>
          <span id="netWorkHours">0.0</span>
          <span>h</span>
        </div>
      </div>

      <!-- ボタン -->
      <div class="form-buttons">
        <button class="btn-cancel" onclick="goBack()">キャンセル</button>
        <button class="btn-save" onclick="saveMfg()">保存</button>
      </div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/mfg.js"></script>
  </body>
</html>
